name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Compile & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      # binaries.soliditylang.org is intermittently flaky from GH runners
      # (observed: partial-download EACCES, HH11 "compiler before downloaded").
      # Cache the downloaded compilers and retry the first population once.
      - name: Cache hardhat compilers
        uses: actions/cache@v4
        with:
          path: ~/.cache/hardhat-nodejs/compilers-v2
          key: hardhat-solc-${{ runner.os }}-${{ hashFiles('hardhat.config.*') }}

      - name: Compile contracts
        run: npx hardhat compile || { echo "retrying after transient solc download failure"; sleep 20; rm -rf ~/.cache/hardhat-nodejs/compilers-v2; npx hardhat compile; }

      - name: Periphery upstream-purity check
        # Fails loudly if any vendored @uniswap/v3-periphery file drifts from the
        # published package. Core math is imported from @uniswap/v3-core (not
        # vendored), so it cannot drift and needs no separate check.
        run: node scripts/check_periphery_purity.js

      - name: Run test suite
        run: npm test
