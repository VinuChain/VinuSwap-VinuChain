name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Compile & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      # Hardhat's compiler downloader races on fresh CI caches and can leave
      # solc binaries without the execute bit (spawn EACCES; observed on 3 of
      # 4 runs) or die mid-download (HH11). Fix perms + one retry, and cache
      # the healed compilers so later runs skip the downloader entirely.
      - name: Cache hardhat compilers
        uses: actions/cache@v4
        with:
          path: ~/.cache/hardhat-nodejs/compilers-v2
          key: hardhat-solc-${{ runner.os }}-${{ hashFiles('hardhat.config.*') }}

      - name: Compile contracts
        run: |
          fix_solc_perms() { find ~/.cache/hardhat-nodejs/compilers-v2 -type f -name 'solc-*' -exec chmod +x {} + 2>/dev/null || true; }
          fix_solc_perms
          npx hardhat compile && exit 0
          echo "compile failed — fixing solc perms and retrying"
          fix_solc_perms
          npx hardhat compile && exit 0
          echo "still failing — purging compiler cache and re-downloading"
          rm -rf ~/.cache/hardhat-nodejs/compilers-v2
          npx hardhat compile || { fix_solc_perms; npx hardhat compile; }

      - name: Periphery upstream-purity check
        # Fails loudly if any vendored @uniswap/v3-periphery file drifts from the
        # published package. Core math is imported from @uniswap/v3-core (not
        # vendored), so it cannot drift and needs no separate check.
        run: node scripts/check_periphery_purity.js

      - name: Run test suite
        run: npm test
